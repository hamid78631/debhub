name : CI Devhub

on: 
  push :
    branches : [main]
  pull_request : 
    branches : [main]

jobs : 
  build-backend : 
    runs-on : ubuntu-latest
    steps : 
      - uses : actions/checkout@v3
      - name : Build backend Docker image
        run: docker build ./backend

  build-frontend : 
    runs-on : ubuntu-latest
    steps : 
      - uses : actions/checkout@v3
      - name : Build frontend Docker image
        run : docker build ./frontend
